<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Stats — Spotify Stats</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="dashboard">
    <!-- Profile bar -->
    <div class="profile-bar">
      <div class="profile-info" id="profile-info">
        <div class="skeleton" style="width:48px;height:48px;border-radius:50%"></div>
        <span class="profile-name">Loading…</span>
      </div>
      <div class="profile-actions">
        <a href="/loading.html" class="logout-btn">Rescan</a>
        <a href="/logout" class="logout-btn">Log out</a>
      </div>
    </div>

    <!-- Library stats summary -->
    <div class="library-stats" id="library-stats"></div>

    <!-- ===== Listening History Section ===== -->
    <div class="section-header">
      <h2 class="section-title">Listening History</h2>
      <div class="time-range-tabs">
        <button class="tab-btn active" data-range="short_term">Last 4 weeks</button>
        <button class="tab-btn" data-range="medium_term">Last 6 months</button>
        <button class="tab-btn" data-range="long_term">All time</button>
      </div>
    </div>

    <div class="sections-grid">
      <div class="card">
        <h2>Top Artists</h2>
        <ul class="stat-list" id="listening-artists"></ul>
      </div>

      <div class="card">
        <h2>Top Tracks</h2>
        <ul class="stat-list" id="listening-tracks"></ul>
      </div>

      <div class="card">
        <h2>Recently Played</h2>
        <ul class="stat-list" id="recently-played"></ul>
      </div>
    </div>

    <!-- ===== Playlist Analysis Section ===== -->
    <div class="section-header" style="margin-top:2rem">
      <h2 class="section-title">Playlist Analysis</h2>
      <div class="filter-bar">
        <select class="filter-select" id="genre-filter">
          <option value="">All genres</option>
        </select>
        <select class="filter-select" id="decade-filter">
          <option value="">All decades</option>
        </select>
        <button class="filter-clear" id="filter-clear" style="display:none">Clear filters</button>
      </div>
    </div>

    <div class="sections-grid">
      <div class="card">
        <h2>Most Curated Artists</h2>
        <ul class="stat-list" id="top-artists"></ul>
      </div>

      <div class="card">
        <h2>Most Curated Tracks</h2>
        <ul class="stat-list" id="top-tracks"></ul>
      </div>

      <div class="card">
        <h2>Top Genres</h2>
        <ul class="genre-list" id="genre-breakdown"></ul>
      </div>

      <div class="card">
        <h2>Decade Breakdown</h2>
        <ul class="genre-list" id="decade-breakdown"></ul>
      </div>

      <div class="card">
        <h2>Playlist Appearances</h2>
        <p class="card-subtitle" id="playlist-subtitle"></p>
        <ul class="stat-list" id="playlist-appearances"></ul>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
