<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveStation</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <!-- ===== Visualizer ===== -->
    <section class="visualizer-section" id="visualizer-section">
      <canvas id="visualizer-canvas"></canvas>
      <div class="viz-brand">
        <span class="brand-name">WaveStation</span>
        <span class="brand-sep">/</span>
        <span class="brand-tagline">internet radio</span>
      </div>
      <div class="viz-controls">
        <button class="viz-ctrl-btn" id="theme-btn" title="Switch Theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </button>
        <button class="viz-ctrl-btn" id="settings-btn" title="Visualizer Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <button class="viz-ctrl-btn" id="fullscreen-btn" title="Fullscreen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
      </div>

      <!-- Settings Panel -->
      <div class="viz-settings hidden" id="viz-settings">
        <div class="settings-header">
          <span class="settings-title">Visualizer Settings</span>
          <button class="settings-close" id="settings-close">&times;</button>
        </div>
        <div class="settings-body">

          <div class="settings-group">
            <span class="settings-group-label">Camera</span>
            <label class="setting-row" title="Distance of the camera from center">
              <span class="setting-label">Orbit Radius</span>
              <input type="range" class="setting-slider" id="s-orbit-radius" min="3" max="25" step="0.5" value="20" />
              <span class="setting-val" id="sv-orbit-radius">20</span>
            </label>
            <label class="setting-row" title="Vertical height of the camera above the plane">
              <span class="setting-label">Orbit Height</span>
              <input type="range" class="setting-slider" id="s-orbit-height" min="1" max="50" step="0.5" value="5" />
              <span class="setting-val" id="sv-orbit-height">5</span>
            </label>
            <label class="setting-row" title="How fast the camera orbits around the visualizer">
              <span class="setting-label">Orbit Speed</span>
              <input type="range" class="setting-slider" id="s-orbit-speed" min="0" max="0.5" step="0.005" value="0.15" />
              <span class="setting-val" id="sv-orbit-speed">0.15</span>
            </label>
            <label class="setting-row" title="Field of view — lower is more telephoto, higher is wider">
              <span class="setting-label">FOV</span>
              <input type="range" class="setting-slider" id="s-fov" min="15" max="90" step="1" value="50" />
              <span class="setting-val" id="sv-fov">50</span>
            </label>
          </div>

          <div class="settings-group">
            <span class="settings-group-label">Chart</span>
            <label class="setting-row" title="Number of frequency bands to split the audio into">
              <span class="setting-label">Bands</span>
              <input type="range" class="setting-slider" id="s-bands" min="4" max="48" step="1" value="24" />
              <span class="setting-val" id="sv-bands">24</span>
            </label>
            <label class="setting-row" title="Maximum height of peaks when audio is at full amplitude">
              <span class="setting-label">Peak Height</span>
              <input type="range" class="setting-slider" id="s-peak-height" min="0.5" max="10" step="0.25" value="2" />
              <span class="setting-val" id="sv-peak-height">2</span>
            </label>
            <label class="setting-row" title="Width and depth of the visualizer plane">
              <span class="setting-label">Chart Size</span>
              <input type="range" class="setting-slider" id="s-chart-size" min="2" max="20" step="0.5" value="16" />
              <span class="setting-val" id="sv-chart-size">16</span>
            </label>
          </div>

          <div class="settings-group">
            <span class="settings-group-label">Smoothing</span>
            <label class="setting-row" title="How many times to smooth the history curve — higher = softer peaks">
              <span class="setting-label">Smooth Passes</span>
              <input type="range" class="setting-slider" id="s-smooth-passes" min="0" max="20" step="1" value="12" />
              <span class="setting-val" id="sv-smooth-passes">12</span>
            </label>
            <label class="setting-row" title="FFT temporal smoothing — higher = slower response, less jitter">
              <span class="setting-label">FFT Smoothing</span>
              <input type="range" class="setting-slider" id="s-fft-smooth" min="0" max="0.99" step="0.01" value="0.95" />
              <span class="setting-val" id="sv-fft-smooth">0.95</span>
            </label>
          </div>

          <div class="settings-group">
            <span class="settings-group-label">Dynamics</span>
            <label class="setting-row" title="How fast peaks fall off after a hit — higher = longer sustain">
              <span class="setting-label">Decay Rate</span>
              <input type="range" class="setting-slider" id="s-decay" min="0.01" max="0.98" step="0.01" value="0.10" />
              <span class="setting-val" id="sv-decay">0.10</span>
            </label>
            <label class="setting-row" title="How fast the running average adapts to level changes">
              <span class="setting-label">Baseline Rate</span>
              <input type="range" class="setting-slider" id="s-avg-rate" min="0.0005" max="0.05" step="0.0005" value="0.003" />
              <span class="setting-val" id="sv-avg-rate">0.003</span>
            </label>
            <label class="setting-row" title="How fast the peak ceiling drops — lower = peaks stay large longer">
              <span class="setting-label">Ceiling Decay</span>
              <input type="range" class="setting-slider" id="s-peak-decay" min="0.0005" max="0.02" step="0.0005" value="0.0005" />
              <span class="setting-val" id="sv-peak-decay">0.0005</span>
            </label>
            <label class="setting-row" title="How much of the baseline is treated as silence — higher = only strong signals show">
              <span class="setting-label">Floor Factor</span>
              <input type="range" class="setting-slider" id="s-floor-factor" min="0.5" max="0.99" step="0.01" value="0.99" />
              <span class="setting-val" id="sv-floor-factor">0.99</span>
            </label>
          </div>

          <div class="settings-group">
            <span class="settings-group-label">Appearance</span>
            <label class="setting-row" title="Opacity of the ridge/flow lines">
              <span class="setting-label">Line Opacity</span>
              <input type="range" class="setting-slider" id="s-line-opacity" min="0" max="1" step="0.05" value="1" />
              <span class="setting-val" id="sv-line-opacity">1</span>
            </label>
            <label class="setting-row" title="Opacity of the filled area beneath ridges (WaveStation only)">
              <span class="setting-label">Fill Opacity</span>
              <input type="range" class="setting-slider" id="s-fill-opacity" min="0" max="1" step="0.01" value="0.10" />
              <span class="setting-val" id="sv-fill-opacity">0.10</span>
            </label>
            <label class="setting-row" title="0 = always full color, 1 = white at rest, color on amplitude">
              <span class="setting-label">Color Mix</span>
              <input type="range" class="setting-slider" id="s-color-mix" min="0" max="1" step="0.05" value="0" />
              <span class="setting-val" id="sv-color-mix">0</span>
            </label>
            <label class="setting-row" title="How fast color fades back to white after a peak — lower = lingers longer">
              <span class="setting-label">Color Decay</span>
              <input type="range" class="setting-slider" id="s-color-decay" min="0.005" max="0.5" step="0.005" value="0.03" />
              <span class="setting-val" id="sv-color-decay">0.03</span>
            </label>
          </div>

          <div class="settings-group theme-perlin" style="display:none">
            <span class="settings-group-label">Flow Field</span>
            <label class="setting-row" title="Number of streamlines per frequency band">
              <span class="setting-label">Lines per Band</span>
              <input type="range" class="setting-slider" id="s-flow-per-band" min="5" max="100" step="5" value="50" />
              <span class="setting-val" id="sv-flow-per-band">50</span>
            </label>
            <label class="setting-row" title="Vertices per streamline — more = longer lines">
              <span class="setting-label">Steps per Line</span>
              <input type="range" class="setting-slider" id="s-flow-steps" min="20" max="200" step="5" value="80" />
              <span class="setting-val" id="sv-flow-steps">80</span>
            </label>
            <label class="setting-row" title="Spatial scale of the noise field — lower = broader curves, higher = tighter curls">
              <span class="setting-label">Noise Frequency</span>
              <input type="range" class="setting-slider" id="s-flow-noise-freq" min="0.005" max="0.2" step="0.005" value="0.04" />
              <span class="setting-val" id="sv-flow-noise-freq">0.04</span>
            </label>
            <label class="setting-row" title="How fast the noise field evolves over time — lower = calmer drift">
              <span class="setting-label">Noise Speed</span>
              <input type="range" class="setting-slider" id="s-flow-noise-speed" min="0.005" max="0.2" step="0.005" value="0.025" />
              <span class="setting-val" id="sv-flow-noise-speed">0.025</span>
            </label>
            <label class="setting-row" title="Layers of noise detail — more = richer turbulence">
              <span class="setting-label">Octaves</span>
              <input type="range" class="setting-slider" id="s-flow-octaves" min="1" max="5" step="1" value="2" />
              <span class="setting-val" id="sv-flow-octaves">2</span>
            </label>
            <label class="setting-row" title="Where lines start fading near the edges — higher = later fade, more visible">
              <span class="setting-label">Edge Fade Start</span>
              <input type="range" class="setting-slider" id="s-flow-edge-fade" min="0.2" max="0.95" step="0.05" value="0.6" />
              <span class="setting-val" id="sv-flow-edge-fade">0.6</span>
            </label>
            <label class="setting-row" title="How much streamline start positions wander over time">
              <span class="setting-label">Start Drift</span>
              <input type="range" class="setting-slider" id="s-flow-start-drift" min="0" max="3" step="0.1" value="0.8" />
              <span class="setting-val" id="sv-flow-start-drift">0.8</span>
            </label>
            <label class="setting-row" title="0 = bands in frequency order, 1 = scattered across the plane">
              <span class="setting-label">Band Spread</span>
              <input type="range" class="setting-slider" id="s-flow-band-spread" min="0" max="1" step="0.05" value="0" />
              <span class="setting-val" id="sv-flow-band-spread">0</span>
            </label>
          </div>

          <div class="settings-group theme-perlin" style="display:none">
            <span class="settings-group-label">Step Size <small>(bass → treble)</small></span>
            <label class="setting-row" title="Step size for the lowest frequency bands at rest">
              <span class="setting-label">Lo (Bass)</span>
              <input type="range" class="setting-slider" id="s-flow-step-size-lo" min="0.02" max="0.5" step="0.01" value="0.12" />
              <span class="setting-val" id="sv-flow-step-size-lo">0.12</span>
            </label>
            <label class="setting-row" title="Step size for the highest frequency bands at rest">
              <span class="setting-label">Hi (Treble)</span>
              <input type="range" class="setting-slider" id="s-flow-step-size-hi" min="0.02" max="0.5" step="0.01" value="0.20" />
              <span class="setting-val" id="sv-flow-step-size-hi">0.20</span>
            </label>
            <label class="setting-row" title="How much amplitude increases step size — lines stretch further on loud hits">
              <span class="setting-label">Audio React</span>
              <input type="range" class="setting-slider" id="s-flow-step-size-react" min="0" max="0.5" step="0.01" value="0.12" />
              <span class="setting-val" id="sv-flow-step-size-react">0.12</span>
            </label>
          </div>

          <div class="settings-group">
            <span class="settings-group-label">History</span>
            <label class="setting-row" title="Number of amplitude samples stored — longer = more visible song history">
              <span class="setting-label">History Length</span>
              <input type="range" class="setting-slider" id="s-hist-w" min="100" max="800" step="10" value="250" />
              <span class="setting-val" id="sv-hist-w">250</span>
            </label>
          </div>

          <div class="settings-group theme-perlin" style="display:none">
            <span class="settings-group-label">History Mapping</span>
            <label class="setting-row" title="Time offset spread between streamlines in a band — higher = peaks ripple across more lines">
              <span class="setting-label">Stagger</span>
              <input type="range" class="setting-slider" id="s-flow-stagger" min="0" max="0.8" step="0.05" value="0.4" />
              <span class="setting-val" id="sv-flow-stagger">0.4</span>
            </label>
            <label class="setting-row" title="Portion of history each line reads — lower = compressed recent history, higher = full timeline">
              <span class="setting-label">History Window</span>
              <input type="range" class="setting-slider" id="s-flow-hist-window" min="0.1" max="1" step="0.05" value="1" />
              <span class="setting-val" id="sv-flow-hist-window">1</span>
            </label>
            <label class="setting-row" title="Fade length at the edges of the history buffer — higher = softer entry/exit">
              <span class="setting-label">History Fade</span>
              <input type="range" class="setting-slider" id="s-flow-hist-fade" min="0.02" max="0.3" step="0.01" value="0.08" />
              <span class="setting-val" id="sv-flow-hist-fade">0.08</span>
            </label>
            <label class="setting-row" title="0 = smooth noise-driven height, 1 = history-driven peaks — blend between organic flow and temporal recording">
              <span class="setting-label">History Blend</span>
              <input type="range" class="setting-slider" id="s-flow-hist-blend" min="0" max="1" step="0.05" value="0.2" />
              <span class="setting-val" id="sv-flow-hist-blend">0.2</span>
            </label>
          </div>

          <div class="settings-group">
            <span class="settings-group-label">Sync</span>
            <label class="setting-row" title="Delays audio output to sync with visualizer latency">
              <span class="setting-label">Audio Delay</span>
              <input type="range" class="setting-slider" id="s-audio-delay" min="0" max="0.3" step="0.005" value="0.10" />
              <span class="setting-val" id="sv-audio-delay">100ms</span>
            </label>
          </div>

          <div class="settings-group">
            <span class="settings-group-label">Audio Range</span>
            <label class="setting-row" title="Minimum decibel threshold — signals below this are treated as silence">
              <span class="setting-label">Min dB</span>
              <input type="range" class="setting-slider" id="s-min-db" min="-100" max="-30" step="1" value="-80" />
              <span class="setting-val" id="sv-min-db">-80</span>
            </label>
            <label class="setting-row" title="Maximum decibel threshold — signals above this are clipped to full">
              <span class="setting-label">Max dB</span>
              <input type="range" class="setting-slider" id="s-max-db" min="-30" max="0" step="1" value="0" />
              <span class="setting-val" id="sv-max-db">0</span>
            </label>
          </div>

        </div>
      </div>
    </section>

    <!-- ===== Now-Playing Bar ===== -->
    <header class="now-playing-bar hidden" id="now-playing-bar">
      <div class="np-left">
        <img class="np-favicon" id="np-favicon" src="" alt="" />
        <div class="np-info">
          <span class="np-name" id="np-name"></span>
          <span class="np-meta" id="np-meta"></span>
        </div>
      </div>
      <div class="np-controls">
        <button class="np-btn" id="np-stop-btn" title="Stop">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>
      <div class="np-right">
        <input type="range" class="volume-slider" id="np-volume" min="0" max="100" value="80" />
        <button class="mute-btn" id="np-mute" title="Mute">
          <svg id="mute-icon-on" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5zM14 3.23v2.06a6.51 6.51 0 010 13.42v2.06A8.5 8.5 0 0014 3.23z"/></svg>
          <svg id="mute-icon-off" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12A4.5 4.5 0 0014 8.5v2.09l2.41 2.41c.06-.31.09-.65.09-1zm2.5 0a6.5 6.5 0 01-.78 3.11l1.46 1.46A8.44 8.44 0 0021 12a8.5 8.5 0 00-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.46 8.46 0 003.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4l-2.1 2.1L12 8.2V4z"/></svg>
        </button>
      </div>
    </header>

    <!-- ===== Main Content ===== -->
    <main class="main">

      <!-- Search -->
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search stations..." autocomplete="off" />
        <button id="search-btn" class="btn btn-primary">Search</button>
      </div>

      <!-- Genre quick-picks -->
      <div class="genre-pills" id="genre-pills">
        <button class="pill active" data-genre="">All</button>
        <button class="pill" data-genre="pop">Pop</button>
        <button class="pill" data-genre="rock">Rock</button>
        <button class="pill" data-genre="jazz">Jazz</button>
        <button class="pill" data-genre="classical">Classical</button>
        <button class="pill" data-genre="electronic">Electronic</button>
        <button class="pill" data-genre="hip hop">Hip Hop</button>
        <button class="pill" data-genre="country">Country</button>
        <button class="pill" data-genre="r&b">R&B</button>
        <button class="pill" data-genre="latin">Latin</button>
        <button class="pill" data-genre="metal">Metal</button>
        <button class="pill" data-genre="lofi">Lo-Fi</button>
        <button class="pill" data-genre="ambient">Ambient</button>
        <button class="pill" data-genre="blues">Blues</button>
        <button class="pill" data-genre="reggae">Reggae</button>
        <button class="pill" data-genre="news">News</button>
      </div>

      <!-- Tabs: Results / Favorites -->
      <div class="tab-bar">
        <button class="tab active" data-tab="results">Stations</button>
        <button class="tab" data-tab="favorites">Favorites</button>
      </div>

      <!-- Station lists -->
      <div class="station-list" id="results-panel">
        <div class="empty-state" id="results-empty">
          <p>Search for a station or pick a genre above</p>
        </div>
        <div id="results-list"></div>
      </div>

      <div class="station-list hidden" id="favorites-panel">
        <div class="empty-state" id="favorites-empty">
          <p>No favorites yet — tap the star on any station</p>
        </div>
        <div id="favorites-list"></div>
      </div>
    </main>

    <footer class="footer">
      <span>Powered by <a href="https://www.radio-browser.info" target="_blank" rel="noopener">Radio Browser</a></span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>
  <script src="/app.js"></script>
  <script src="/visualizer.js"></script>
</body>
</html>
