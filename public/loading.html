<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanning — Wavestation</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="landing">
  <div class="landing-container">
    <img src="/favicon.svg" alt="Wavestation" width="48" height="48" />
    <h1 style="font-size:1.5rem;margin-top:1.25rem">Scanning your library</h1>
    <p id="scan-phase" class="tagline" style="min-height:1.5em">Connecting…</p>
    <div class="scan-progress-wrapper">
      <div class="progress-bar-container" style="margin-top:1.5rem;height:8px">
        <div class="progress-bar" id="scan-bar" style="width:0%"></div>
      </div>
      <span class="scan-percent" id="scan-percent">0%</span>
    </div>
  </div>

  <script>
    (function () {
      const phase = document.getElementById("scan-phase");
      const bar = document.getElementById("scan-bar");
      const pct = document.getElementById("scan-percent");
      const source = new EventSource("/api/scan");

      source.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === "progress") {
          phase.textContent = data.phase;
          bar.style.width = data.percent + "%";
          pct.textContent = data.percent + "%";
        } else if (data.type === "done") {
          source.close();
          window.location.href = "/dashboard.html";
        } else if (data.type === "error") {
          source.close();
          phase.textContent = "Scan failed: " + data.message;
        }
      };

      source.onerror = () => {
        source.close();
        phase.textContent = "Connection lost. Please refresh.";
      };
    })();
  </script>
</body>
</html>
