<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanning — Spotify Stats</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="landing">
  <div class="landing-container">
    <svg class="spotify-icon" viewBox="0 0 24 24" width="48" height="48" fill="#1DB954">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
    </svg>
    <h1 style="font-size:1.5rem;margin-top:1.25rem">Scanning your library</h1>
    <p id="scan-phase" class="tagline" style="min-height:1.5em">Connecting…</p>
    <div class="scan-progress-wrapper">
      <div class="progress-bar-container" style="margin-top:1.5rem;height:8px">
        <div class="progress-bar" id="scan-bar" style="width:0%"></div>
      </div>
      <span class="scan-percent" id="scan-percent">0%</span>
    </div>
  </div>

  <script>
    (function () {
      const phase = document.getElementById("scan-phase");
      const bar = document.getElementById("scan-bar");
      const pct = document.getElementById("scan-percent");
      const source = new EventSource("/api/scan");

      source.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === "progress") {
          phase.textContent = data.phase;
          bar.style.width = data.percent + "%";
          pct.textContent = data.percent + "%";
        } else if (data.type === "done") {
          source.close();
          window.location.href = "/dashboard.html";
        } else if (data.type === "error") {
          source.close();
          phase.textContent = "Scan failed: " + data.message;
        }
      };

      source.onerror = () => {
        source.close();
        phase.textContent = "Connection lost. Please refresh.";
      };
    })();
  </script>
</body>
</html>
